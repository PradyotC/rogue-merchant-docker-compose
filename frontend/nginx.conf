# ═══════════════════════════════════════════════════════════════
#  ROGUE MERCHANT — Nginx Configuration
#  Serves the frontend SPA and reverse-proxies /api/* to Flask.
# ═══════════════════════════════════════════════════════════════

server {
    listen       80;
    server_name  localhost;

    # ── Static frontend ─────────────────────────────────────────
    root  /var/www/rogue-merchant;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → Flask on port 5000 ──────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;

        # CORS headers (also handled by Flask-CORS, belt-and-suspenders)
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Security headers ────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── Gzip ────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
